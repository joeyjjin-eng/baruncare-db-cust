<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>바른케어플러스 · 관리자페이지 로그인</title>

<style>
  /* Local Pretendard */
  @font-face { font-family:'Pretendard'; font-weight:400; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-Regular.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:500; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-Medium.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:600; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-SemiBold.woff2') format('woff2'); }
  @font-face { font-family:'Pretendard'; font-weight:700; font-style:normal; font-display:swap;
    src: url('../fonts/Pretendard-Bold.woff2') format('woff2'); }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Pretendard','"Apple SD Gothic Neo"','system-ui','sans-serif'] },
        colors: {
          primary: { DEFAULT:'#FF8A65', hover:'#F47551', press:'#E36544', bg:'#FFF1EB' },
          page: '#FFFFFF',
          ink: { primary:'#333333', secondary:'#666666', tertiary:'#999999', placeholder:'#AAAAAA' },
          line: '#E5E7EB',
          divider: '#EEEEEE',
          field: '#F1F2F4',
        },
        boxShadow: { card: '0 1px 2px rgba(0,0,0,0.04)' },
        maxWidth: { page: '1200px' },
      },
    },
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family: 'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
    background: #FFFFFF; color: #333333;
    font-size: 16px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input { font-family: inherit; font-size: inherit; }
  a { color: inherit; text-decoration: none; }
</style>

<style type="text/tailwindcss">
  @layer base {
    h1 { font-size: 18px; font-weight: 700; line-height: 1.4; margin: 0; }
  }
</style>
</head>
<body class="font-sans">

<div class="min-h-screen flex flex-col bg-white">

  <!-- Center area -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 py-16">

    <!-- Logo -->
    <img src="../assets/barun_logo.png" alt="바른케어플러스"
         class="h-10 w-auto mb-10 select-none" draggable="false" />

    <!-- Card -->
    <section class="w-full max-w-[480px] bg-white rounded-[16px] border border-divider shadow-card px-10 py-12"
             aria-label="관리자 로그인">
      <h1 class="text-center text-ink-primary mb-8">관리자페이지</h1>

      <form id="loginForm" class="flex flex-col gap-5" onsubmit="return onLoginSubmit(event)">
        <div>
          <label for="loginId" class="block mb-2 text-[14px] font-medium text-ink-secondary">아이디</label>
          <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4">
            <input id="loginId" name="id" type="text" placeholder="아이디" autocomplete="username"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
          </div>
        </div>

        <div>
          <label for="loginPw" class="block mb-2 text-[14px] font-medium text-ink-secondary">비밀번호</label>
          <div class="flex items-center h-12 rounded-[8px] bg-field border border-transparent focus-within:border-primary px-4">
            <input id="loginPw" name="password" type="password" placeholder="비밀번호" autocomplete="current-password"
                   class="w-full h-full bg-transparent outline-none text-[16px] text-ink-primary placeholder:text-ink-placeholder" />
          </div>
        </div>

        <button id="submitBtn" type="submit"
                class="mt-2 h-12 w-full rounded-[8px] bg-primary text-white text-[16px] font-semibold transition-colors hover:bg-primary-hover active:bg-primary-press">
          로그인
        </button>
      </form>
    </section>
  </div>

  <!-- Footer -->
  <footer class="bg-white">
    <div class="max-w-page mx-auto px-6 py-10 flex flex-col items-center gap-2">
      <p class="text-[14px] text-ink-primary"><span class="font-semibold">Copyright</span> ⓒ 천호인터내셔널</p>
      <p class="text-[14px] text-ink-tertiary">1644-0161(10:00~17:00) | cs@weplat.co.kr</p>
    </div>
  </footer>
</div>

<script>
  // 이미 관리자 세션이 있으면 바로 어드민 진입
  (async () => {
    try {
      const res = await fetch('../api/me.php', { credentials: 'same-origin' });
      if (!res.ok) return;
      const data = await res.json().catch(() => ({}));
      if (data && data.ok && data.data && data.data.user && data.data.user.role === 'admin') {
        location.replace('./users.html');
      }
    } catch (_) { /* ignore */ }
  })();

  async function onLoginSubmit(e) {
    e.preventDefault();
    const username = document.getElementById('loginId').value.trim();
    const password = document.getElementById('loginPw').value;
    if (!username || !password) {
      alert('아이디와 비밀번호를 입력하세요.');
      return false;
    }

    const $btn = document.getElementById('submitBtn');
    const originalLabel = $btn.textContent;
    $btn.disabled = true;
    $btn.textContent = '로그인 중...';

    try {
      const res = await fetch('../api/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        credentials: 'same-origin',
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        alert(data.error || '로그인에 실패했습니다.');
        return false;
      }

      // 관리자가 아니면 로그아웃 처리 후 거절
      const user = data.data && data.data.user;
      if (!user || user.role !== 'admin') {
        try { await fetch('../api/logout.php', { credentials: 'same-origin' }); } catch (_) {}
        alert('관리자만 접근 가능합니다.');
        return false;
      }

      location.href = './users.html';
    } catch (err) {
      alert('네트워크 오류: ' + (err && err.message ? err.message : err));
    } finally {
      $btn.disabled = false;
      $btn.textContent = originalLabel;
    }
    return false;
  }
</script>

</body>
</html>
