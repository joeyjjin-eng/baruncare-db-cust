<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>바른케어플러스 · 간병비 청구 도우미</title>

<style>
  /* Local Pretendard font (uploaded to ./fonts) */
  @font-face {
    font-family: 'Pretendard';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Pretendard-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Pretendard';
    font-weight: 500;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Pretendard-Medium.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Pretendard';
    font-weight: 600;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Pretendard-SemiBold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Pretendard';
    font-weight: 700;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Pretendard-Bold.woff2') format('woff2');
  }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard', '"Apple SD Gothic Neo"', 'system-ui', 'sans-serif'],
        },
        colors: {
          primary: {
            DEFAULT: '#2D7A4F',
            dark:    '#1F5E3A',
            bg:      '#E8F5EE',
          },
          accent: {
            orange: '#F4845F',
          },
          ink: {
            label:       '#1A1A1A',
            sub:         '#555555',
            placeholder: '#AAAAAA',
          },
          surface: {
            page:    '#FFFFFF',
            card:    '#FFFFFF',
            field:   '#F6F6F6',
            border:  '#E0E0E0',
            disabled:'#CCCCCC',
          },
        },
        boxShadow: {
          card: '0 1px 3px rgba(0,0,0,0.06)',
          sheet:'0 -4px 24px rgba(0,0,0,0.10)',
        },
        borderRadius: {
          'btn': '12px',
          'card':'12px',
          'hero':'16px',
          'sheet':'20px',
        },
        maxWidth: {
          'mobile': '390px',
        },
      },
    },
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif;
    background: #FFFFFF;
    color: #1A1A1A;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  /* Hide native select arrow — we render a custom chevron */
  select.bare {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background: transparent;
  }
  select.bare::-ms-expand { display: none; }
  /* iOS zoom prevention */
  input, select, textarea { font-size: 16px; }
  /* Page transitions */
  .fwd { animation: fwd .22s ease both; }
  .bwd { animation: bwd .22s ease both; }
  @keyframes fwd { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes bwd { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
  /* Sheet animation */
  .sheet-back { animation: fadeIn .2s ease both; }
  .sheet-panel { animation: slideUp .25s cubic-bezier(.25,.46,.45,.94) both; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback } = React;

/* ---------- Asset paths ---------- */
const ASSETS = './assets/';
const IMG = {
  logo:        ASSETS + 'barun_logo.png',
  hero:        ASSETS + 'image 10.png',
  iconProcess: ASSETS + 'image 13.png',
  iconDoc:     ASSETS + 'image 14.png',
  chevRight:   ASSETS + 'chevron-right.png',
  chevDown:    ASSETS + 'chevron-down.png',
  check:        ASSETS + 'check_1.png',  // chunky gray — checklist boxes (process / docs)
  checkLineOff: ASSETS + 'check.png',    // thin gray  — agreement sheet (off state)
  checkLineOn:  ASSETS + 'check-1.png',  // thin green — agreement sheet (on state)
  completion:  ASSETS + 'Completion.png',
  x:           ASSETS + 'x.png',
};

/* ---------- Inline icons ---------- */
const Stroke = (path, w = 22, h = 22, sw = 2) => (
  <svg width={w} height={h} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {path}
  </svg>
);
const ArrowLeft = () => Stroke(<><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></>);
const Menu      = () => Stroke(<><line x1="4" y1="7"  x2="20" y2="7"  /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="17" x2="20" y2="17" /></>);
const Close     = () => Stroke(<><line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" /></>);

/* ---------- Layout ---------- */
const MobileLayout = ({ children }) => (
  <div className="max-w-mobile mx-auto min-h-screen bg-surface-page relative shadow-[0_0_60px_rgba(0,0,0,0.10)] overflow-hidden">
    {children}
  </div>
);

/* ---------- Header ---------- */
const Header = ({ onBack, onMenu, showBack = false, showMenu = false }) => (
  <header className="relative h-14 flex items-center justify-center px-4 bg-surface-card">
    {showBack && (
      <button
        type="button"
        onClick={onBack}
        aria-label="뒤로가기"
        className="absolute left-3 p-2 rounded-lg text-ink-label active:bg-surface-page"
      >
        <ArrowLeft />
      </button>
    )}
    <img src={IMG.logo} alt="바른케어플러스" className="h-7 w-auto select-none" />
    {showMenu && (
      <button
        type="button"
        onClick={onMenu}
        aria-label="메뉴"
        className="absolute right-3 p-2 rounded-lg text-ink-label active:bg-surface-page"
      >
        <Menu />
      </button>
    )}
  </header>
);

/* ---------- HeroCard ---------- */
const HeroCard = () => (
  <div className="rounded-hero overflow-hidden bg-[#2D6E4E] h-[280px] relative">
    <img
      src={IMG.hero}
      alt="간병사와 어르신"
      className="absolute inset-0 w-full h-full object-cover"
    />
  </div>
);

/* ---------- HeroContent ---------- */
const HeroContent = () => (
  <div className="mt-6">
    <h1 className="text-[26px] font-bold text-ink-label leading-[1.15] tracking-tight">
      간병비 청구 도우미
    </h1>
    <p className="mt-3 text-[14px] text-ink-sub leading-[1.5]">
      서류준비부터 보험금청구 완료까지!<br />
      DB손해보험 간병비 청구, 혼자 고민하지 말고<br />
      전문가와 마무리하세요.
    </p>
  </div>
);

/* ---------- MenuItem ---------- */
const MenuItem = ({ iconSrc, label, onClick }) => (
  <button
    type="button"
    onClick={onClick}
    className="w-full flex justify-between items-center px-5 py-4 rounded-card border border-surface-border bg-surface-card active:bg-surface-page transition-colors"
  >
    <span className="flex items-center gap-3">
      <img src={iconSrc} alt="" aria-hidden="true" className="w-6 h-6 object-contain" />
      <span className="text-[16px] font-semibold text-ink-label">{label}</span>
    </span>
    <img src={IMG.chevRight} alt="" aria-hidden="true" className="w-5 h-5 object-contain opacity-60" />
  </button>
);

/* ---------- CTA (fixed bottom) ---------- */
const CTAButton = ({ children, onClick, disabled, variant = 'primary' }) => {
  const base = 'pointer-events-auto w-full h-14 rounded-btn text-white font-semibold text-[16px] tracking-wide transition-colors disabled:bg-surface-disabled disabled:cursor-not-allowed';
  const variants = {
    primary: 'bg-primary active:bg-primary-dark',
  };
  return (
    <div className="fixed bottom-0 left-0 right-0 mx-auto max-w-mobile px-5 pb-8 pt-3 bg-surface-page pointer-events-none">
      <button type="button" onClick={onClick} disabled={disabled} className={base + ' ' + variants[variant]}>
        {children}
      </button>
    </div>
  );
};

/* ---------- HomeScreen / Intro ---------- */
const HomeScreen = ({ onStart, onProcess, onDocs }) => (
  <>
    <Header />
    <main className="px-5 pb-32">
      <HeroCard />
      <HeroContent />
      <div className="mt-10 space-y-3">
        <MenuItem iconSrc={IMG.iconProcess} label="청구 프로세스" onClick={onProcess} />
        <MenuItem iconSrc={IMG.iconDoc}     label="필수 첨부 서류 안내" onClick={onDocs} />
      </div>
    </main>
    <CTAButton onClick={onStart}>간병비 보험금청구 서비스 신청하기</CTAButton>
  </>
);

/* ---------- ProcessScreen (청구 프로세스) ---------- */
const ProcessScreen = ({ onConfirm, onBack }) => {
  const docs = [
    '간병인등록증빙', '간병비계좌이체내역', '간병일지',
    '입퇴원확인서', '진단서', '보험금청구서',
  ];
  const steps = [
    { n: '1', t: '간병인 등록 및 매칭',
      d: '가족간병일 경우, 가족을 간병인으로 등록하고 환자와 매칭 계약을 합니다.\n계약서를 반드시 작성하여 간병 기간과 비용을 명시합니다.' },
    { n: '2', t: '간병일지 작성',
      d: '실제 간병을 수행하며 간병일지를 꼭 작성해야 합니다.' },
    { n: '3', t: '간병비 결제(퇴원 시)',
      d: '환자(보험가입자)가 간병인에게 직접 간병비를 이체하거나 플랫폼을 통해 결제합니다.\n1일 간병비는 최소 10만원 이상으로 정산하여야 합니다.' },
    { n: '4', t: '필수 서류 준비',
      d: '보험사에 제출할 아래 서류들을 발급받습니다.' },
  ];
  return (
    <>
      <Header onBack={onBack} showBack />
      <main className="px-5 pt-2 pb-28">
        <h1 className="text-[26px] font-bold text-ink-label tracking-tight">청구 프로세스</h1>
        <hr className="mt-3 border-t border-ink-label/80" />
        <div className="mt-5 space-y-6">
          {steps.map(s => (
            <section key={s.n}>
              <h2 className="text-[20px] font-bold text-ink-label">{s.n}. {s.t}</h2>
              <p className="mt-2 text-[14px] leading-[1.5] text-ink-sub whitespace-pre-line">{s.d}</p>
              {s.n === '4' && (
                <div className="mt-4 rounded-card bg-[#f2f2f2] p-4 space-y-2.5">
                  {docs.map(d => (
                    <div key={d} className="flex items-center gap-2 text-[14px] text-ink-sub">
                      <CheckGray />
                      <span>{d}</span>
                    </div>
                  ))}
                </div>
              )}
            </section>
          ))}
        </div>
      </main>
      <CTAButton onClick={onConfirm}>확인</CTAButton>
    </>
  );
};

const CheckGray = ({ size = 16 }) => (
  <img src={IMG.check} alt="" aria-hidden="true"
       style={{ width: size, height: size }}
       className="object-contain shrink-0" />
);
// Line-style pair used inside the AgreementSheet (off + on)
const CheckLineOff = ({ size = 18 }) => (
  <img src={IMG.checkLineOff} alt="" aria-hidden="true"
       style={{ width: size, height: size }}
       className="object-contain shrink-0" />
);
const CheckLineOn = ({ size = 18 }) => (
  <img src={IMG.checkLineOn} alt="" aria-hidden="true"
       style={{ width: size, height: size }}
       className="object-contain shrink-0" />
);

/* ---------- DocsScreen (필수 첨부 서류 안내) ---------- */
const DocsScreen = ({ onConfirm, onBack }) => {
  const docs = [
    '간병인등록증빙', '간병비계좌이체내역', '간병일지',
    '입퇴원확인서', '진단서', '보험금청구서',
  ];
  return (
    <>
      <Header onBack={onBack} showBack />
      <main className="px-5 pt-6 pb-28">
        <h1 className="text-[26px] font-bold text-ink-label tracking-tight">필수 서류 첨부 안내</h1>
        <hr className="mt-3 border-t border-ink-label/80" />
        <div className="mt-5 space-y-3">
          {docs.map(d => (
            <div key={d} className="flex items-center gap-3 text-[14px] text-ink-sub">
              <CheckGray />
              <span>{d}</span>
            </div>
          ))}
        </div>
      </main>
      <CTAButton onClick={onConfirm}>확인</CTAButton>
    </>
  );
};

/* ---------- FormField ---------- */
const FormField = ({ label, children }) => (
  <div className="mb-5">
    <label className="block text-[14px] font-medium text-ink-label mb-2">{label}</label>
    {children}
  </div>
);

/* ---------- TextInput ---------- */
const TextInput = ({ value, onChange, placeholder, type = 'text', inputMode, maxLength }) => {
  const filled = value && value.length > 0;
  return (
    <div className="relative">
      <input
        type={type}
        inputMode={inputMode}
        maxLength={maxLength}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        className="w-full pl-4 pr-12 py-3.5 bg-surface-field rounded-btn text-[16px] text-ink-label border border-surface-border outline-none placeholder:text-ink-placeholder focus:border-primary"
      />
      {filled && (
        <button
          type="button"
          onClick={() => onChange('')}
          aria-label="지우기"
          className="absolute right-3 top-1/2 -translate-y-1/2 p-1 rounded-full active:bg-surface-border/50"
        >
          <img src={IMG.x} alt="" aria-hidden="true" className="w-4 h-4 object-contain" />
        </button>
      )}
    </div>
  );
};

/* ---------- GenderToggle ---------- */
const GenderToggle = ({ value, onChange }) => {
  const Btn = ({ label, val }) => {
    const active = value === val;
    return (
      <button
        type="button"
        onClick={() => onChange(val)}
        className={
          'flex-1 h-12 rounded-btn text-[16px] transition-colors bg-surface-card ' +
          (active
            ? 'border border-primary text-primary font-semibold'
            : 'border border-surface-border text-ink-sub font-normal')
        }
      >
        {label}
      </button>
    );
  };
  return (
    <div className="flex gap-2">
      <Btn label="남성" val="male" />
      <Btn label="여성" val="female" />
    </div>
  );
};

/* ---------- SelectBox / DateDropdowns ---------- */
const SelectBox = ({ value, onChange, placeholder, options }) => {
  const empty = !value;
  return (
    <div
      className={
        'relative flex items-center px-3 h-12 rounded-btn border bg-surface-card ' +
        (empty ? 'border-primary' : 'border-primary')
      }
    >
      <select
        className={
          'bare w-full pr-6 text-[16px] outline-none bg-transparent ' +
          (empty ? 'text-ink-label' : 'text-ink-label')
        }
        value={value}
        onChange={(e) => onChange(e.target.value)}
      >
        <option value="">{placeholder}</option>
        {options.map((opt) => (
          <option key={opt} value={opt}>{opt}</option>
        ))}
      </select>
      <img
        src={IMG.chevDown}
        alt=""
        aria-hidden="true"
        className="absolute right-3 w-4 h-4 object-contain pointer-events-none"
      />
    </div>
  );
};

const DateDropdowns = ({ year, month, day, onYear, onMonth, onDay }) => {
  const thisYear = new Date().getFullYear();
  const years  = useMemo(() => Array.from({ length: 100 }, (_, i) => String(thisYear - i)), [thisYear]);
  const months = useMemo(() => Array.from({ length: 12  }, (_, i) => String(i + 1)), []);
  const days   = useMemo(() => Array.from({ length: 31  }, (_, i) => String(i + 1)), []);
  return (
    <div className="grid grid-cols-3 gap-2">
      <SelectBox value={year}  onChange={onYear}  placeholder="년" options={years} />
      <SelectBox value={month} onChange={onMonth} placeholder="월" options={months} />
      <SelectBox value={day}   onChange={onDay}   placeholder="일" options={days} />
    </div>
  );
};

/* ---------- AgreementSheet ---------- */
const AGREEMENT_ITEMS = [
  { key: 'privacy',    label: '개인정보 수집 및 이용 동의', required: true,  url: 'https://www.notion.so/3597b6dfe28380cd9245ea4ae97e6a5d?source=copy_link' },
  { key: 'thirdParty', label: '개인정보 제3자 제공 동의',   required: true,  url: 'https://www.notion.so/3-3597b6dfe2838068a5e9fb288f58c7b0?source=copy_link' },
  { key: 'marketing',  label: '마케팅 활용 동의',           required: false, url: 'https://www.notion.so/3597b6dfe283803e9684c15017b32859?source=copy_link' },
];

const AgreementSheet = ({ open, onClose, onSubmit }) => {
  const [checked, setChecked] = useState({ privacy: false, thirdParty: false, marketing: false });
  const allOn = AGREEMENT_ITEMS.every(it => checked[it.key]);
  const requiredOk = AGREEMENT_ITEMS.filter(it => it.required).every(it => checked[it.key]);
  const toggle = (k) => setChecked(c => ({ ...c, [k]: !c[k] }));
  const toggleAll = () => {
    const next = !allOn;
    setChecked({ privacy: next, thirdParty: next, marketing: next });
  };
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center pointer-events-none">
      <div className="sheet-back absolute inset-0 bg-black/30 pointer-events-auto" onClick={onClose} />
      <div className="sheet-panel relative w-full max-w-mobile bg-surface-card rounded-t-sheet shadow-sheet pb-8 pointer-events-auto">
        <div className="px-5 pt-6">
          {/* All-agree pill */}
          <button
            type="button"
            onClick={toggleAll}
            className={
              'w-full h-13 py-4 rounded-btn flex items-center justify-center gap-1.5 transition-colors ' +
              (allOn ? 'border border-primary text-primary bg-surface-card' : 'border border-surface-border text-ink-sub bg-surface-card')
            }
          >
            {allOn ? <CheckLineOn /> : <CheckLineOff />}
            <span className={'text-[16px] ' + (allOn ? 'font-semibold' : 'font-medium')}>약관 전체동의</span>
          </button>

          {/* Individual rows */}
          <ul className="mt-2">
            {AGREEMENT_ITEMS.map(it => (
              <li key={it.key} className="flex items-center gap-2 py-2">
                <button
                  type="button"
                  onClick={() => toggle(it.key)}
                  aria-label={`${it.label} 동의`}
                  className="flex-1 flex items-center gap-2 -my-1 py-1 text-left"
                >
                  {checked[it.key] ? <CheckLineOn /> : <CheckLineOff />}
                  <span className={'flex-1 text-[16px] ' + (checked[it.key] ? 'text-ink-label' : 'text-ink-sub')}>
                    {it.label}
                    <span className={'ml-1 text-[14px] font-medium ' + (it.required ? 'text-primary' : 'text-ink-placeholder')}>
                      {it.required ? '(필수)' : '(선택)'}
                    </span>
                  </span>
                </button>
                <a
                  href={it.url}
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label={`${it.label} 자세히 보기`}
                  className="flex-shrink-0 -m-2 p-2"
                >
                  <img src={IMG.chevRight} alt="" aria-hidden="true" className="w-4 h-4 object-contain opacity-60" />
                </a>
              </li>
            ))}
          </ul>

          {/* Action row */}
          <div className="mt-4 flex gap-3">
            <button
              type="button"
              onClick={onClose}
              className="flex-1 h-14 rounded-btn bg-surface-disabled text-white font-semibold text-[16px] active:bg-[#b8b8b8] tracking-wide"
            >뒤로</button>
            <button
              type="button"
              onClick={() => onSubmit(checked)}
              disabled={!requiredOk}
              className="flex-[2] h-14 rounded-btn bg-primary text-white font-semibold text-[16px] active:bg-primary-dark disabled:bg-surface-disabled disabled:cursor-not-allowed tracking-wide"
            >다음</button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ---------- Input filters ---------- */
// Korean (Hangul / Jamo) + Latin letters + spaces only
const filterName  = (v) => (v || '').replace(/[^A-Za-zㄱ-ㆎ가-힣\s]/g, '');
// Digits only, capped at 11 chars
const filterPhone = (v) => (v || '').replace(/\D/g, '').slice(0, 11);

/* ---------- FormScreen ---------- */
const FormScreen = ({ data, onChange, onNext, onBack }) => {
  const phoneOk = (data.phone || '').length === 11;
  const allFilled =
    data.name && phoneOk && data.gender && data.year && data.month && data.day;
  return (
    <>
      <Header onBack={onBack} showBack />
      <main className="px-5 pt-4 pb-32">
        <FormField label="이름">
          <TextInput
            value={data.name}
            onChange={(v) => onChange('name', filterName(v))}
            placeholder="홍길동" />
        </FormField>

        <FormField label="휴대폰번호">
          <TextInput
            value={data.phone}
            onChange={(v) => onChange('phone', filterPhone(v))}
            placeholder="01012345678"
            type="tel"
            inputMode="numeric"
            maxLength={11} />
        </FormField>

        <FormField label="성별">
          <GenderToggle value={data.gender} onChange={(v) => onChange('gender', v)} />
        </FormField>

        <FormField label="생년월일">
          <DateDropdowns
            year={data.year}   onYear={(v)  => onChange('year', v)}
            month={data.month} onMonth={(v) => onChange('month', v)}
            day={data.day}     onDay={(v)   => onChange('day', v)}
          />
        </FormField>
      </main>
      <CTAButton onClick={onNext} disabled={!allFilled}>다음</CTAButton>
    </>
  );
};

/* ---------- DoneScreen (서비스 신청 완료!) ---------- */
const DoneScreen = ({ data, onHome }) => {
  const formatPhone = (p = '') => {
    const d = (p || '').replace(/\D/g, '');
    if (d.length === 11) return `${d.slice(0,3)}-${d.slice(3,7)}-${d.slice(7)}`;
    if (d.length === 10) return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}`;
    return p;
  };
  return (
    <>
      <Header />
      <main className="px-5 pt-10 pb-32">
        <div className="flex justify-center mb-8">
          <img
            src={IMG.completion}
            alt=""
            aria-hidden="true"
            className="w-[120px] h-[120px] object-contain select-none"
          />
        </div>

        <h1 className="text-center text-[26px] font-bold text-ink-label tracking-tight">서비스 신청 완료!</h1>

        <div className="mt-10 rounded-card border border-surface-border bg-surface-card p-7">
          <p className="text-center text-[14px] leading-[1.5] text-ink-sub">
            청구 도우미가<br />
            신청하신 연락처를 통해<br />
            별도 연락을 드립니다.
          </p>
          <hr className="my-6 border-t border-surface-border" />
          <dl className="space-y-4">
            <div className="flex items-center justify-between text-[14px]">
              <dt className="text-ink-sub">이름</dt>
              <dd className="text-ink-label font-medium">{data.name || '-'}</dd>
            </div>
            <div className="flex items-center justify-between text-[14px]">
              <dt className="text-ink-sub">연락처</dt>
              <dd className="text-ink-label font-medium">{formatPhone(data.phone) || '-'}</dd>
            </div>
          </dl>
        </div>
      </main>
      <CTAButton onClick={onHome}>홈으로</CTAButton>
    </>
  );
};

/* ---------- API ---------- */
// Apache 동일 도메인 배포 시 상대 경로 그대로 둡니다.
// 다른 도메인이면 절대 URL로 변경 (예: 'https://baruncare.example.com/api/submit.php').
const API_SUBMIT = './api/submit.php';

async function submitApplication(data, agreements) {
  const res = await fetch(API_SUBMIT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name:            data.name,
      phone:           data.phone,
      gender:          data.gender,
      year:            parseInt(data.year, 10),
      month:           parseInt(data.month, 10),
      day:             parseInt(data.day, 10),
      agreePrivacy:    !!agreements.privacy,
      agreeThirdParty: !!agreements.thirdParty,
      agreeMarketing:  !!agreements.marketing,
    }),
  });
  let body = null;
  try { body = await res.json(); } catch (_) {}
  if (!res.ok || !body || body.ok !== true) {
    const err = new Error(body?.error || 'NETWORK');
    err.fields = body?.fields || [];
    throw err;
  }
  return body; // { ok: true, id: N }
}

/* ---------- App ---------- */
const App = () => {
  const [screen, setScreen] = useState('home'); // home | process | docs | form | done
  const [dir, setDir]       = useState('fwd');
  const [agreeOpen, setAgree] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [data, setData] = useState({
    name: '', phone: '', gender: '', year: '', month: '', day: '',
  });

  const go = useCallback((s, d = 'fwd') => { setDir(d); setScreen(s); }, []);
  const patch = (k, v) => setData(d => ({ ...d, [k]: v }));

  const handleSubmit = async (agreements) => {
    if (submitting) return;
    setSubmitting(true);
    try {
      await submitApplication(data, agreements);
      setAgree(false);
      go('done');
    } catch (err) {
      const msg = err?.message === 'VALIDATION'
        ? '입력값을 확인해주세요.'
        : '신청 처리 중 오류가 발생했습니다.\n잠시 후 다시 시도해주세요.';
      alert(msg);
    } finally {
      setSubmitting(false);
    }
  };

  const body = (() => {
    if (screen === 'home')    return <HomeScreen onStart={() => go('form')} onProcess={() => go('process')} onDocs={() => go('docs')} />;
    if (screen === 'process') return <ProcessScreen onBack={() => go('home', 'bwd')} onConfirm={() => go('home', 'bwd')} />;
    if (screen === 'docs')    return <DocsScreen onBack={() => go('home', 'bwd')} onConfirm={() => go('home', 'bwd')} />;
    if (screen === 'form')    return <FormScreen
                                       data={data}
                                       onChange={patch}
                                       onBack={() => go('home', 'bwd')}
                                       onNext={() => setAgree(true)} />;
    if (screen === 'done')    return <DoneScreen
                                       data={data}
                                       onHome={() => { setData({ name:'', phone:'', gender:'', year:'', month:'', day:'' }); go('home', 'bwd'); }} />;
    return null;
  })();

  return (
    <MobileLayout>
      <div key={screen} className={dir} style={{ display: 'contents' }}>
        {body}
      </div>
      <AgreementSheet
        open={agreeOpen}
        onClose={() => setAgree(false)}
        onSubmit={handleSubmit}
      />
    </MobileLayout>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
